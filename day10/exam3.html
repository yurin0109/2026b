<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel='stylesheet' href='exam3.css'>
</head>
<body>
    
    <!-- wrap, 모든 요소 감싼 구역 -->
    <div id = "wrap">   <!-- display:block 갖는 마크업 , 레이아웃 -->

        <!-- header , 상단 구역 -->
        <div id = "header" >
            로고, 메인메뉴, 검색창
        </div>

        <!-- main , 본문 구역 -->
        <div id = "main">
            <div id="content"> 본문 </div> 
            <div id="sidebar"> 사이드바 </div>
        </div>

        <!-- footer , 푸터 구역 -->
        <div id = "footer">
            푸터, 홈페이지 네비
        </div>
        

        <div class="parent">
            <div class="PX"> px 단위 </div>
            <div class="percent"> % 단위 </div>
            <div class="rem"> REM 단위 </div>
            <div class="vw"> VW 단위 </div>
            <div class="vh"> VH 단위 </div>
        </div>
        

</body>
</html>
