<!DOCTYPE html> <!-- HTML5 버전 선언 -->

<html lang="ko">

<head>

    <meta charset="UTF-8">
    <title>Form 태그</title>

</head>

<body>

    <!-- 외부 JavaScript 연결 -->
    <script src="exam1.js"></script>

    <!-- ===========================
         입력 태그(input)
    ============================ -->

    <!-- 전송 버튼 -->
    전송버튼 :
    <input type="submit" value="전송버튼" />

    <br><br>

    <!-- 리셋 버튼 -->
    리셋버튼 :
    <input type="reset" value="리셋버튼" />

    <br><br>

    <!-- 여러 줄 입력 -->
    긴텍스트 :
    <textarea cols="50" rows="30"></textarea>

    <br><br>

    <!-- 목록 상자 -->
    목록상자 :

    <select>

        <option>항목1</option>
        <option>항목2</option>
        <option>항목3</option>

    </select>

</body>

</html>
