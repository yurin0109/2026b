<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 기초</title>
</head>

<body>

<!-- ===========================
     HTML 기초
=========================== -->

<!--
HTML(HyperText Markup Language)
: 웹페이지의 구조를 만드는 마크업 언어

저장
- File → Auto Save(자동 저장) 활성화

마크업 언어 특징
1. <태그>로 시작하고 </태그>로 끝난다.
2. 정해진 태그만 사용할 수 있다.

예시
<p>안녕하세요</p>
<h3>제목</h3>

실행 방법
- HTML 파일에서 마우스 오른쪽 클릭
- Open with Live Server 선택

script 태그
- HTML 안에 JavaScript를 작성할 수 있다.
- sc 입력 후 Enter(자동완성) 또는 script 입력
-->

<!-- ===========================
     HTML 태그 예제
=========================== -->

<p>단어2</p>

<h3>제목입니다.</h3>

<!-- ===========================
     HTML 안에서 JavaScript 작성
=========================== -->

<script>

    // JavaScript 코드 작성

    console.log("안녕하세요");

</script>

<!-- ===========================
     외부 JavaScript 연결
=========================== -->

<script src="./exam.js"></script>

</body>
</html>
