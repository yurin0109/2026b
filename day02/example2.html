<!DOCTYPE html> <!-- HTML5 버전 선언 -->

<html lang="ko"> <!-- HTML 시작 -->

<head> <!-- HTML 헤더 시작 -->

    <meta charset="UTF-8"> <!-- 한글 인코딩 -->
    <title>Document</title> <!-- 브라우저 탭 제목 -->

</head> <!-- HTML 헤더 끝 -->

<body> <!-- HTML 본문 시작 -->

    안녕하세요.

    <!-- 제목 태그 -->
    <h1>안녕하세요1</h1>
    <h2>안녕하세요2</h2>
    <h3>안녕하세요3</h3>
    <h4>안녕하세요4</h4>
    <h5>안녕하세요5</h5>
    <h6>안녕하세요6</h6>

    <!-- h7 태그는 존재하지 않는다. -->

    <!-- 문단 태그 -->
    <p>문단입니다.</p>

    <!-- 순서 있는 목록 -->
    <ol>
        <li>항목1</li>
        <li>항목2</li>
    </ol>

    <!-- 순서 없는 목록 -->
    <ul>
        <li>항목1</li>
        <li>항목2</li>
    </ul>

    <!-- 하이퍼링크 -->
    <a href="https://naver.com">네이버</a>

    <a href="https://sungkyul.ac.kr">성결대학교</a>
    <br>

    <a href="tel:010-1234-5678">전화걸기</a>

    <!-- 이미지 -->
    <img src="./코난.jpeg" alt="코난">
    <img src="../코난.jpeg" alt="코난">

    <!--
    상대경로

    ./      현재 폴더 (생략 가능)

    ../     상위 폴더 한 단계

    ../../  상위 폴더 두 단계
    -->

    <!-- 절대경로 -->
    <img src="C:\2026B\day02\코난.jpeg" alt="코난">

    <!-- 인터넷 이미지 -->
    <img src="https://이미지주소" alt="이미지">

    <br>

    <!-- 오디오 -->
    <audio src="" controls></audio>

    <!-- 비디오 -->
    <video src="" controls></video>

    <!--
    autoplay는 대부분 브라우저에서 막혀 있다.
    muted를 같이 사용하면 자동재생 가능
    -->

    <!--
    iframe
    - 유튜브 퍼가기
    - 구글 지도 퍼가기
    -->

</body>

</html>
